server:
  port: 8080
  servlet:
    context-path: /api
  # 增加连接超时时间，支持大文件处理
  connection-timeout: 180000  # 3分钟
  
  # Tomcat配置
  tomcat:
    max-http-form-post-size: -1  # 禁用POST大小限制
    connection-timeout: 180000  # 3分钟
    threads:
      max: 200
      min-spare: 10

spring:
  application:
    name: secure-file-manager
  
  # 新增：解决Spring Boot 2.6.x与Knife4j/Swagger兼容问题的核心配置
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/secure_file_manager?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

    # Druid 连接池配置
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: false

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: -1
      max-request-size: -1
      file-size-threshold: 10MB

  # Jackson 配置
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss

  # SMTP服务配置
  mail:
    host: smtp.qq.com
    port: 465
    username: 2284641493@qq.com
    password: afhumznleiyhebid
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.security.filemanager.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j 配置
knife4j:
  enable: true
  production: false

# 自定义配置
secure-file:
  # 文件存储根目录（生产环境应配置为绝对路径）
  storage-root: D:/projects/SecFileManager/storage

  # 大文件上传阈值（超过该大小启用分块加密）
  upload:
    large-file-threshold: 52428800  # 50MB

  # 大文件预览配置
  preview:
    large-file-threshold: 2147483648  # 2GB
    chunk-size: 268435456  # 256MB

  # 系统主密钥（用于加密用户主密钥）
  # 【安全警告】生产环境必须通过环境变量或外部配置文件注入，不能硬编码
  # 这里为了课程演示写在配置文件中
  system-master-key: "ThisIsASystemMasterKeyForEducationPurpose32Bytes"

  # JWT 配置
  jwt:
    secret: "SecureFileManagerJwtSecretKeyForCourseDesignProject2024"
    expiration: 86400000  # 24小时（毫秒）
    header: Authorization
    prefix: "Bearer "

  # 找回密码配置
  reset-code:
    ttl-minutes: 5
    resend-seconds: 60
  reset-mail:
    from: "忘记密码服务 <2284641493@qq.com>"